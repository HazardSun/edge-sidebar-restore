<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>新标签页</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  display:flex; flex-direction:row;
  font:14px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  transition:all .22s cubic-bezier(0.4,0,0.2,1);
}
.main {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:40px; min-width:0;
  background:#fff; overflow-y:auto;
}
@media (prefers-color-scheme:dark) {
  body { background:#1f1f1f; color:#e0e0e0; }
  .main { background:#2d2d2d; }
  .search-box input { background:#1f1f1f; color:#e0e0e0; border-color:#3d3d3d; }
  .link-card { background:#2d2d2d; border-color:#3d3d3d; color:#e0e0e0; }
  .link-card:hover { border-color:#4ba0e8; }
  .link-letter { background:#4ba0e8; }
  .link-card .ln { color:#999; }
  .pill-expand { background:#2d2d2d; border-color:#3d3d3d; }
  .add-link-card { border-color:#3d3d3d; color:#999; }
  .add-link-card:hover { border-color:#4ba0e8; color:#4ba0e8; }
  .nt-edit-form input { background:#1f1f1f; color:#e0e0e0; border-color:#3d3d3d; }
}
.main::-webkit-scrollbar { width:4px; }
.main::-webkit-scrollbar-thumb { background:#e0e0e0; border-radius:2px; }
.search-box { width:100%; max-width:560px; margin-bottom:40px; display:flex; gap:8px; }
.search-box input {
  flex:1; padding:14px 20px; border:2px solid #e0e0e0;
  border-radius:12px; font-size:16px; outline:none; background:#f5f5f5;
  transition:border-color .2s;
}
.search-box input:focus { border-color:#0078d4; }
.search-box button {
  padding:14px 28px; border:none; border-radius:12px;
  background:#0078d4; color:#fff; font-size:15px; cursor:pointer; font-weight:500;
}
.search-box button:hover { background:#106ebe; }
.links-title { width:100%; max-width:560px; font-size:13px; color:#999; margin-bottom:12px; letter-spacing:.5px; }
.links-grid { width:100%; max-width:560px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.link-card {
  position:relative; display:flex; flex-direction:column; align-items:center; gap:6px; padding:16px 8px;
  border-radius:12px; background:#f8f9fa; border:1px solid #e8e8e8;
  cursor:pointer; text-decoration:none; color:#1a1a1a; transition:border-color .2s,transform .15s;
}
.link-card:hover { border-color:#0078d4; transform:translateY(-2px); }
.link-card .del-link {
  position:absolute; top:2px; right:4px; width:20px; height:20px; border:none;
  background:transparent; color:#ccc; font-size:16px; cursor:pointer; border-radius:4px;
  display:none; align-items:center; justify-content:center; line-height:1;
}
.link-card:hover .del-link { display:flex; }
.link-card .del-link:hover { background:#ff4444; color:#fff; }
.add-link-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:16px 8px; border-radius:12px; border:2px dashed #ddd;
  cursor:pointer; color:#bbb; font-size:32px; transition:border-color .2s,color .2s;
  min-height:94px;
}
.add-link-card:hover { border-color:#0078d4; color:#0078d4; }
.add-link-card span { font-size:12px; }
.link-letter { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; background:#0078d4; color:#fff; flex-shrink:0; }
.link-card .ln { font-size:13px; text-align:center; color:#666; word-break:break-all; }
.nt-edit-form { width:100%; max-width:560px; display:none; flex-direction:column; gap:8px; padding:16px; background:#f5f5f5; border-radius:12px; margin-bottom:16px; }
@media (prefers-color-scheme:dark) { .nt-edit-form { background:#1f1f1f; } }
.nt-edit-form input { padding:10px 14px; border:1px solid #e0e0e0; border-radius:8px; font-size:14px; outline:none; }
.nt-edit-form input:focus { border-color:#0078d4; }
.nt-edit-form .btn-row { display:flex; gap:8px; }
.nt-edit-form .btn-row button { padding:8px 20px; border:none; border-radius:8px; cursor:pointer; font-size:13px; }
.nt-edit-form .btn-row .save-btn { background:#0078d4; color:#fff; }
.nt-edit-form .btn-row .save-btn:hover { background:#106ebe; }
.nt-edit-form .btn-row .cancel-btn { background:#e0e0e0; color:#333; }
.nt-edit-form .btn-row .cancel-btn:hover { background:#ccc; }
.sidebar-wrap { width:360px; height:100vh; flex-shrink:0; border-left:1px solid #e0e0e0; transition:width .22s cubic-bezier(0.4,0,0.2,1); overflow:hidden; position:relative; }
.sidebar-wrap.collapsed { width:0; border-left:none; }
.sidebar-wrap iframe { width:100%; height:100%; border:none; display:block; }
.pill-expand {
  position:fixed; right:0; top:50%; transform:translateY(-50%);
  width:44px; height:44px; border-radius:8px 0 0 8px;
  background:#f5f5f5; border:1px solid #e0e0e0; border-right:none;
  box-shadow:-2px 0 8px rgba(0,0,0,0.08);
  cursor:pointer; display:none; align-items:center; justify-content:center;
  z-index:2147483646; transition:width .2s;
}
.pill-expand:hover { width:100px; }
.pill-expand svg { flex-shrink:0; }
.pill-expand .pl-txt { font-size:13px; color:#0078d4; font-weight:500; white-space:nowrap; overflow:hidden; margin-left:2px; display:none; }
.pill-expand:hover .pl-txt { display:inline; }
</style>
</head>
<body>
<div class="main" id="main-area">
  <div class="search-box">
    <input type="text" id="nt-search" placeholder="搜索..." autocomplete="off">
    <button id="nt-search-btn">搜索</button>
  </div>
  <div class="nt-edit-form" id="nt-edit-form">
    <input type="text" id="nt-link-name" placeholder="名称">
    <input type="text" id="nt-link-url" placeholder="网址">
    <div class="btn-row">
      <button class="save-btn" id="nt-save-link">保存</button>
      <button class="cancel-btn" id="nt-cancel-link">取消</button>
    </div>
  </div>
  <div class="links-title">常用链接</div>
  <div id="nt-links" class="links-grid"></div>
</div>
<div class="sidebar-wrap" id="sidebar-wrap">
  <iframe src="sidebar.html" id="sb-iframe"></iframe>
</div>
<div class="pill-expand" id="nt-pill">
  <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="#0078d4"/></svg>
  <span class="pl-txt">展开</span>
</div>
<script src="newtab.js"></script>
</body>
</html>
